baseURL: "https://gerosalorenzo.com/"
title: Lorenzo Gerosa
pagination.pagerSize: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true



params:
  env: production
  title: Lorenzo's Blog
  description: "Portfolio and tech blog. Programming, self hosting and 3D printing"
  keywords: [Programming, Self-hosting, 3D Printing, Portfolio, Hugo, Tech Blog]
  author: Lorenzo Gerosa
  images: ["https://gerosalorenzo.com/cover.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false
  mainSections: ["blog", "series"]

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  assets:
    favicon: "/favicon_logo/favicon.ico"
    favicon16x16: "/favicon_logo/favicon-16x16.png"
    favicon32x32: "/favicon_logo/favicon-32x32.png"
    apple_touch_icon: "/favicon_logo/apple-touch-icon.png"
    safari_pinned_tab: "/favicon_logo/safari-pinned-tab.svg"

  label:
    text: "Home"
    icon: "/favicon_logo/apple-touch-icon.png"
    iconHeight: 35

  homeInfoParams:
    Title: "Welcome! 👋"
    Content: I write about programming, self-hosting, and 3D printing projects. Explore my latest posts below or search for specific topics.

  profileMode:
    enabled: false

  social: true

  socialIcons:
    - name: github
      url: "https://gerosalorenzo.com/gh"
    - name: linkedin
      url: "https://gerosalorenzo.com/ld"  

  # analytics:
  #   google:
  #     SiteVerificationTag: "XYZabc"
  #   bing:
  #     SiteVerificationTag: "XYZabc"
  #   yandex:
  #     SiteVerificationTag: "XYZabc"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  editPost:
    URL: "https://github.com/gerolori/gerosalorenzo.com/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    useExtendedSearch: true
    ignoreDiacritics: true
    shouldSort: true
    minMatchCharLength: 2
    ignoreLocation: true
    findAllMatches: true
    limit: 10
    includeMatches: true
    includeScore: true
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: home
      name: Home
      url: /
      weight: 1
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 10
    - identifier: series
      name: Series
      url: /series/
      weight: 15
    - identifier: explore
      name: Explore
      url: /explore/
      weight: 20
    # - identifier: about
    #   name: About
    #   url: /about/
    #   weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    style: monokai

# this makes permalink avoid dates as per my filestructure
permalinks:
  blog: "/blog/:slug/"

# Custom taxonomies (must re-declare defaults when adding custom ones)
taxonomies:
  series: series
  category: categories
  tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search